<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座位详情 - 学员视角</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left">
                    <span>9:41</span>
                </div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content">
                <div class="card fade-in">
                    <div class="card-header">
                        <a href="seat.html" class="btn btn-secondary">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                        <div class="card-title">2025党务干部培训班</div>
                    </div>
                </div>

                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-chair" style="color:#2563eb;"></i>
                        <div class="card-title">我的座位</div>
                    </div>
                    <div class="seat-detail-header">
                        <div class="seat-number">前区</div>
                        <div class="seat-info">
                            <div class="seat-row">第 3 排</div>
                            <div class="seat-col">12 座</div>
                        </div>
                    </div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-building"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">越秀会议中心101室 - 报告厅</div>
                                <span class="status-chip status-secure">已签到</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-users" style="color:#22c55e;"></i>
                        <div class="card-title">同组成员</div>
                    </div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);">
                                <i class="fas fa-users"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">第一组 - 党建工作研讨组</div>
                                <a class="cta-chip cta-chip--primary" href="groups.html">查看组员</a>
                            </div>
                        </div>
                    </div>
                </div>


                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-map" style="color:#f97316;"></i>
                        <div class="card-title">会场导航</div>
                    </div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-route"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">步行路线</div>
                                <div class="assistant-item-desc">步行约3分钟，沿主通道向前</div>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-door-open"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">入口位置</div>
                                <div class="assistant-item-desc">正门入口 → 右侧通道 → 第3排</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="bottom-nav">
                <div class="nav-item" onclick="window.location.href='../common/home.html'">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item" onclick="window.location.href='../common/assistant.html'">
                    <div class="nav-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon">
                        <i class="fas fa-compass"></i>
                    </div>
                    <div class="nav-text">导航</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item" onclick="window.location.href='task-list.html'">
                    <div class="nav-icon">
                        <i class="fas fa-tasks"></i>
                    </div>
                    <div class="nav-text">任务</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item" onclick="window.location.href='../common/profile.html'">
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 开始导航
        function startNavigation() {
            alert('正在启动AR导航...');
        }

        // 联系用户
        function contactUser() {
            alert('拨打：138****8888');
        }

        // 发送消息
        function sendMessage() {
            window.location.href = 'chat-private.html?userId=123';
        }

        // 添加到通讯录
        function addToContacts() {
            alert('已添加到通讯录');
        }

        // 查看日程
        function viewSchedule() {
            window.location.href = 'schedule.html';
        }

        // 分享座位
        function shareSeat() {
            alert('分享功能开发中...');
        }

        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            const fadeElements = document.querySelectorAll('.fade-in');
            fadeElements.forEach((el, index) => {
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, index * 100);
            });
        });
    </script>

    <style>
        .seat-detail-header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .seat-number {
            font-size: 28px;
            font-weight: 700;
            color: #2563eb;
            margin-bottom: 8px;
        }
        .seat-info {
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        .seat-row, .seat-col {
            font-size: 16px;
            color: #4b5563;
            font-weight: 500;
        }
        .user-profile {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #f9fafb;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-right: 16px;
            flex-shrink: 0;
        }
        .user-info {
            flex: 1;
        }
        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 4px;
        }
        .user-title {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 4px;
        }
        .user-org {
            font-size: 13px;
            color: #9ca3af;
        }
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 16px;
        }
        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px;
            background: #f9fafb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-item:hover {
            background: #f3f4f6;
            transform: translateY(-2px);
        }
        .action-item i {
            font-size: 20px;
            color: #2563eb;
            margin-bottom: 8px;
        }
        .action-item span {
            font-size: 12px;
            color: #4b5563;
            text-align: center;
        }
    </style>
</body>
</html>
