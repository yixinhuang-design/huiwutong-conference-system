<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码报名 - 学员端</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left"><span>9:41</span></div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content">
                <div class="card card--no-margin fade-in">
                    <div class="card-header">
                        <a href="home.html" class="btn btn-secondary">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                        <div>
                            <div class="card-title">2025党务干部培训班</div>
                        </div>
                    </div>
                            <div class="card fade-in">
                                <div id="register-info-panel">
                                    <!-- 培训信息与报名说明由后端渲染 -->
                                    <div class="info-banner fade-in" style="margin-bottom:12px;">
                                        <strong>2026党务干部培训班</strong><br>
                                        时间：2026年3月10日-3月15日<br>
                                        地点：越秀会议中心/维也纳酒店<br>
                                        主办单位：某某组织部
                                    </div>
                                    <div class="form-hint" style="margin-bottom:8px;">请填写以下报名信息，带*为必填项</div>
                                </div>
                            </div>
                            <div class="card fade-in">
                                <div id="register-form-panel">
                                    <!-- 报名表单由后端渲染，所有字段与后端链路对应 -->
                                    <div class="form-group">
                                        <label class="form-label" for="regName">姓名<span style="color:#e53e3e;">*</span></label>
                                        <input type="text" id="regName" class="form-input" placeholder="请输入姓名" required>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="regPhone">手机号<span style="color:#e53e3e;">*</span></label>
                                        <input type="tel" id="regPhone" class="form-input" placeholder="请输入手机号" required>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="regUnit">单位<span style="color:#e53e3e;">*</span></label>
                                        <input type="text" id="regUnit" class="form-input" placeholder="请输入单位" required>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="regPosition">职位<span style="color:#e53e3e;">*</span></label>
                                        <input type="text" id="regPosition" class="form-input" placeholder="请输入职位" required>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="regRemark">备注</label>
                                        <input type="text" id="regRemark" class="form-input" placeholder="可选填写">
                                    </div>
                                    <div id="dynamicFields"></div>
                                </div>
                            </div>
                    <!-- 报名须知 -->
                    <div class="divider"></div>
                    <div class="form-section-title">报名须知</div>
                    <div style="font-size:13px; color:#64748b; line-height:1.8;">
                        1. 请填写真实准确的个人信息<br>
                        2. 报名后需要等待管理员审核<br>
                        3. 审核通过后将收到短信通知<br>
                        4. 如有疑问请联系会务组<br>
                        5. 报名截止时间：2025年2月10日 18:00
                    </div>

                    <div class="checkbox-group" style="margin-top:16px;">
                        <input type="checkbox" id="agreeTerms">
                        <label for="agreeTerms">我已阅读并同意报名须知</label>
                    </div>
                </div>

                <!-- 附件上传 -->
                <div class="section-title">附件上传</div>
                <div class="card fade-in">
                    <div class="form-group">
                        <label class="form-label">身份证复印件</label>
                        <div class="upload-area" onclick="document.getElementById('idCardFile').click()">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span id="idCardUploadLabel">点击上传身份证复印件</span>
                            <div class="form-hint">支持 JPG、PNG、PDF 格式，不超过10MB</div>
                        </div>
                        <input type="file" id="idCardFile" accept="image/*,.pdf" style="display:none" onchange="uploadFile('idCard', this.files[0])">
                        <div class="form-hint" id="idCardUploadStatus">未上传</div>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <div class="card fade-in">
                    <div class="cta-bar">
                        <button class="btn btn-secondary btn--flex" onclick="location.href='home.html'">
                            <i class="fas fa-times"></i> 取消
                        </button>
                        <button class="btn btn-primary btn--flex" onclick="submitRegistration()">
                            <i class="fas fa-check"></i> 提交报名
                        </button>
                    </div>
                </div>

                <!-- 温馨提示 -->
                <div class="info-banner fade-in">
                    <strong>提示</strong>
                    提交报名后，系统将发送确认短信到您的手机。审核结果也将会通过短信通知，请保持手机畅通。
                </div>

            </div>

            <!-- 底部导航栏 -->
            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-home"></i></div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-robot"></i></div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-comments"></i></div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-history"></i></div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-user"></i></div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8082/api/registration';
        const uploadState = {
            idCard: {
                fileUrl: '',
                sha256: '',
                ocr: null
            }
        };
        let dynamicFieldConfigs = [];

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function loadDynamicFormFields() {
            const meetingId = getMeetingId();
            if (!meetingId) return;

            try {
                const resp = await fetch(`${API_BASE}/form/fields?conferenceId=${meetingId}`, {
                    method: 'GET',
                    headers: {
                        'X-Tenant-Id': getTenantId()
                    }
                });
                const result = await resp.json();
                if (!resp.ok || result.code !== 200 || !Array.isArray(result.data)) {
                    return;
                }

                dynamicFieldConfigs = result.data
                    .filter(f => f && f.enabled !== false)
                    .sort((a, b) => (a.sort || 0) - (b.sort || 0));

                const container = document.getElementById('dynamicFields');
                const fixedKeys = new Set(['name', 'phone', 'unit', 'department', 'position', 'remark']);
                const html = dynamicFieldConfigs
                    .filter(field => !fixedKeys.has((field.key || '').toLowerCase()))
                    .map(field => {
                        const key = field.key || '';
                        const label = field.label || key;
                        const required = field.required ? '<span style="color:#e53e3e;">*</span>' : '';
                        const placeholder = field.placeholder || `请输入${label}`;
                        const options = Array.isArray(field.options) ? field.options : [];
                        const inputId = `dynamic_${key}`;

                        if (field.type === 'select' && options.length) {
                            const opts = options.map(opt => `<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`).join('');
                            return `<div class="form-group"><label class="form-label" for="${inputId}">${escapeHtml(label)}${required}</label><select id="${inputId}" class="form-input"><option value="">请选择</option>${opts}</select></div>`;
                        }

                        return `<div class="form-group"><label class="form-label" for="${inputId}">${escapeHtml(label)}${required}</label><input type="text" id="${inputId}" class="form-input" placeholder="${escapeHtml(placeholder)}"></div>`;
                    })
                    .join('');

                container.innerHTML = html;
            } catch (e) {
                console.warn('加载动态字段失败:', e);
            }
        }

        function getMeetingId() {
            const params = new URLSearchParams(window.location.search);
            const meetingId = params.get('meetingId') || params.get('conferenceId');
            return meetingId ? Number(meetingId) : null;
        }

        function getTenantId() {
            return localStorage.getItem('tenantId') || '2027317834622709762';
        }

        async function uploadFile(type, file) {
            if (!file) {
                return;
            }

            const meetingId = getMeetingId();
            if (!meetingId) {
                alert('缺少会议ID，无法上传');
                return;
            }

            const statusEl = document.getElementById('idCardUploadStatus');
            const labelEl = document.getElementById('idCardUploadLabel');
            statusEl.textContent = '上传中...';

            try {
                const formData = new FormData();
                formData.append('conferenceId', String(meetingId));
                formData.append('fileType', type);
                formData.append('file', file);

                const resp = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    headers: {
                        'X-Tenant-Id': getTenantId()
                    },
                    body: formData
                });

                const result = await resp.json();
                if (!resp.ok || result.code !== 200) {
                    throw new Error(result.message || '上传失败');
                }

                uploadState.idCard.fileUrl = result.data.fileUrl;
                uploadState.idCard.sha256 = result.data.sha256;
                labelEl.textContent = `已上传：${file.name}`;
                statusEl.textContent = '上传成功，OCR识别中...';

                const ocrResp = await fetch(`${API_BASE}/ocr/idCard?photoUrl=${encodeURIComponent(result.data.fileUrl)}`, {
                    method: 'POST',
                    headers: {
                        'X-Tenant-Id': getTenantId()
                    }
                });
                const ocrResult = await ocrResp.json();
                if (ocrResp.ok && ocrResult.code === 200) {
                    uploadState.idCard.ocr = ocrResult.data;
                    const status = ocrResult.data.ocrStatus || 'REVIEW';
                    const reason = ocrResult.data.reason || '';
                    statusEl.textContent = `OCR: ${status}${reason ? ' - ' + reason : ''}`;
                } else {
                    statusEl.textContent = 'OCR识别失败，请稍后在审核页核验';
                }
            } catch (e) {
                console.error('上传失败:', e);
                statusEl.textContent = '上传失败';
                alert('上传失败：' + e.message);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadDynamicFormFields();
        });

        async function submitRegistration() {
            const meetingId = getMeetingId();
            if (!meetingId) {
                alert('缺少会议ID参数');
                return;
            }

            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const unit = document.getElementById('regUnit').value.trim();
            const position = document.getElementById('regPosition').value.trim();
            const remark = document.getElementById('regRemark').value.trim();
            const agree = document.getElementById('agreeTerms').checked;

            if (!name || !phone || !unit || !position) {
                alert('请填写所有必填项（带*号）');
                return;
            }

            if (!agree) {
                alert('请阅读并同意报名须知');
                return;
            }

            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }

            const dynamicValues = {};
            for (const field of dynamicFieldConfigs) {
                const key = field.key || '';
                if (!key) continue;
                const lower = key.toLowerCase();
                if (['name', 'phone', 'unit', 'department', 'position', 'remark'].includes(lower)) {
                    continue;
                }
                const input = document.getElementById(`dynamic_${key}`);
                const value = input ? String(input.value || '').trim() : '';
                if (field.required && !value) {
                    alert(`请填写必填项：${field.label || key}`);
                    return;
                }
                dynamicValues[key] = value;
            }

            const registrationData = {
                unit,
                remark,
                ...dynamicValues,
                files: {
                    idCardPhotoUrl: uploadState.idCard.fileUrl || ''
                },
                ocr: uploadState.idCard.ocr || null
            };

            try {
                const resp = await fetch(`${API_BASE}/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Tenant-Id': getTenantId()
                    },
                    body: JSON.stringify({
                        conferenceId: meetingId,
                        realName: name,
                        phone,
                        email: '',
                        department: unit,
                        position,
                        idCard: (uploadState.idCard.ocr && uploadState.idCard.ocr.idCard) ? uploadState.idCard.ocr.idCard : '未识别',
                        idCardPhotoUrl: uploadState.idCard.fileUrl || '',
                        diplomaPhotoUrl: '',
                        registrationData: JSON.stringify(registrationData)
                    })
                });

                const result = await resp.json();
                if (!resp.ok || result.code !== 200) {
                    throw new Error(result.message || '提交失败');
                }

                alert('报名信息提交成功！\n\n系统已接收图片并完成OCR校验，审核结果将在管理后台可见。');
                setTimeout(() => {
                    window.location.href = `registration-status.html?conferenceId=${meetingId}&phone=${encodeURIComponent(phone)}`;
                }, 600);
            } catch (e) {
                console.error('报名提交失败:', e);
                alert('报名提交失败：' + e.message);
            }
        }
    </script>
</body>
</html>
