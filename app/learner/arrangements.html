    <script>
        // 切换显示区域
        function showSection(section) {
            // 更新pill状态
            document.querySelectorAll('.pill-group .pill').forEach(pill => {
                pill.classList.remove('pill-active');
            });
            event.target.classList.add('pill-active');

            // 隐藏所有section
            document.querySelectorAll('[id$="-section"]').forEach(el => {
                el.style.display = 'none';
            });

            // 显示对应section
            const sectionElement = document.getElementById(section + '-section');
            if (sectionElement) {
                sectionElement.style.display = 'block';
                // 添加淡入动画
                sectionElement.style.opacity = '0';
                sectionElement.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    sectionElement.style.opacity = '1';
                    sectionElement.style.transform = 'translateY(0)';
                }, 50);
            }
        }

        // 联系司机
        function callDriver(phone) {
            alert('拨打电话：' + phone);
        }

        // 联系酒店
        function callHotel(phone) {
            alert('拨打电话：' + phone);
        }

        // 显示酒店地图
        function showHotelMap() {
            alert('正在打开地图导航...');
        }

        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            const fadeElements = document.querySelectorAll('.fade-in');
            fadeElements.forEach((el, index) => {
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, index * 100);
            });
        });
    </script>
