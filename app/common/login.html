<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能会议系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
    <style>
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-logo i {
            font-size: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-title {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            color: #1e293b;
        }
        .login-subtitle {
            font-size: 14px;
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
        }
        .tab-group {
            display: flex;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }
        .tab-item {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            transition: all 0.3s;
        }
        .tab-item.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .input-wrapper .code-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .input-wrapper .code-btn:disabled {
            background: #cbd5e1;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
        }
        .checkbox-group label {
            font-size: 13px;
            color: #64748b;
        }
        .login-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
        }
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #94a3b8;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .divider span {
            padding: 0 12px;
            font-size: 13px;
        }
        .wechat-login {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .wechat-login:hover {
            border-color: #07c160;
            background: #f0fdf4;
        }
        .wechat-login i {
            color: #07c160;
            font-size: 24px;
            margin-right: 8px;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #64748b;
        }
        .login-footer a {
            color: #667eea;
            text-decoration: none;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <i class="fas fa-graduation-cap"></i>
            </div>

            <!-- 标题 -->
            <div class="login-title">智能会议系统</div>
            <div class="login-subtitle">欢迎使用 · 登录或注册</div>

            <!-- Tab切换 -->
            <div class="tab-group">
                <div class="tab-item active" onclick="switchTab('login')">登录</div>
                <div class="tab-item" onclick="switchTab('register')">注册</div>
                <div class="tab-item" onclick="switchTab('code')">验证码登录</div>
            </div>

            <!-- 登录表单 -->
            <div id="loginForm">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <div class="input-wrapper">
                        <i class="fas fa-mobile-alt"></i>
                        <input type="tel" id="loginPhone" placeholder="请输入手机号">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="请输入密码">
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">记住密码</label>
                </div>

                <button class="login-button" onclick="handleLogin()">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" class="hidden">
                <div class="form-group">
                    <label class="form-label">姓名 <span style="color:#ef4444;">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regName" placeholder="请输入真实姓名">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">手机号 <span style="color:#ef4444;">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-mobile-alt"></i>
                        <input type="tel" id="regPhone" placeholder="请输入手机号">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">验证码 <span style="color:#ef4444;">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-shield-alt"></i>
                        <input type="text" id="regCode" placeholder="请输入验证码">
                        <button class="code-btn" onclick="sendCode(this)">获取验证码</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">密码 <span style="color:#ef4444;">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="请设置密码（6-20位）">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">单位</label>
                    <div class="input-wrapper">
                        <i class="fas fa-building"></i>
                        <input type="text" id="regUnit" placeholder="请输入单位名称">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">职务</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-badge"></i>
                        <input type="text" id="regPosition" placeholder="请输入职务">
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agree">
                    <label for="agree">我已阅读并同意 <a href="javascript:void(0)" onclick="showAgreement()">《用户协议》</a> 和 <a href="javascript:void(0)" onclick="showPrivacy()">《隐私政策》</a></label>
                </div>

                <button class="login-button" onclick="handleRegister()">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
            </div>

            <!-- 验证码登录表单 -->
            <div id="codeForm" class="hidden">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <div class="input-wrapper">
                        <i class="fas fa-mobile-alt"></i>
                        <input type="tel" id="codePhone" placeholder="请输入手机号">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-shield-alt"></i>
                        <input type="text" id="smsCode" placeholder="请输入验证码">
                        <button class="code-btn" onclick="sendCode(this)">获取验证码</button>
                    </div>
                </div>

                <button class="login-button" onclick="handleCodeLogin()">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </div>

            <!-- 分隔线 -->
            <div class="divider">
                <span>其他登录方式</span>
            </div>

            <!-- 微信登录 -->
            <div class="wechat-login" onclick="handleWechatLogin()">
                <i class="fab fa-weixin"></i>
                <span>微信快捷登录</span>
            </div>

            <!-- 底部链接 -->
            <div class="login-footer">
                <a href="javascript:void(0)" onclick="showForgotPassword()">忘记密码？</a>
                <span style="margin: 0 8px; color: #cbd5e1;">|</span>
                <a href="javascript:void(0)" onclick="showHelp()">登录帮助</a>
            </div>
        </div>
    </div>

    <script>
        let countdown = 0;
        let timer = null;

        function switchTab(tab) {
            // 更新Tab样式
            document.querySelectorAll('.tab-item').forEach((item, index) => {
                const tabs = ['login', 'register', 'code'];
                if (tabs[index] === tab) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            // 切换表单
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('codeForm').classList.add('hidden');

            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
            } else if (tab === 'register') {
                document.getElementById('registerForm').classList.remove('hidden');
            } else {
                document.getElementById('codeForm').classList.remove('hidden');
            }
        }

        function sendCode(btn) {
            if (countdown > 0) return;

            const phone = btn.parentElement.parentElement.querySelector('input[type="tel"]').value;
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }

            // 开始倒计时
            countdown = 60;
            btn.disabled = true;
            btn.textContent = countdown + '秒后重试';

            timer = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    btn.textContent = countdown + '秒后重试';
                } else {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);

            alert('验证码已发送\n\n验证码：123456\n（演示环境固定验证码）');
        }

        function handleLogin() {
            const phone = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPassword').value;

            if (!phone || !password) {
                alert('请输入手机号和密码');
                return;
            }

            // 模拟登录
            localStorage.setItem('user_logged_in', 'true');
            localStorage.setItem('user_name', '李华');
            localStorage.setItem('user_role', 'learner');

            alert('登录成功！\n\n即将进入系统...');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 500);
        }

        function handleRegister() {
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const code = document.getElementById('regCode').value;
            const password = document.getElementById('regPassword').value;
            const agree = document.getElementById('agree').checked;

            if (!name || !phone || !code || !password) {
                alert('请填写所有必填项');
                return;
            }

            if (!agree) {
                alert('请阅读并同意用户协议和隐私政策');
                return;
            }

            if (password.length < 6 || password.length > 20) {
                alert('密码长度应为6-20位');
                return;
            }

            // 模拟注册
            alert('注册成功！\n\n您的账号：' + phone + '\n\n即将进入系统...');
            localStorage.setItem('user_logged_in', 'true');
            localStorage.setItem('user_name', name);
            localStorage.setItem('user_role', 'learner');

            setTimeout(() => {
                window.location.href = 'home.html';
            }, 500);
        }

        function handleCodeLogin() {
            const phone = document.getElementById('codePhone').value;
            const code = document.getElementById('smsCode').value;

            if (!phone || !code) {
                alert('请输入手机号和验证码');
                return;
            }

            localStorage.setItem('user_logged_in', 'true');
            localStorage.setItem('user_name', '李华');
            localStorage.setItem('user_role', 'learner');

            alert('登录成功！\n\n即将进入系统...');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 500);
        }

        function handleWechatLogin() {
            alert('微信登录\n\n（演示环境）\n\n请使用微信扫描授权登录\n\n授权成功后将自动登录并绑定账号');
        }

        function showForgotPassword() {
            alert('忘记密码\n\n请通过以下方式找回密码：\n\n1. 使用验证码登录\n2. 联系系统管理员重置密码\n3. 通过微信快捷登录');
        }

        function showHelp() {
            alert('登录帮助\n\n常见问题：\n\nQ: 忘记密码怎么办？\nA: 可以使用验证码登录或联系管理员\n\nQ: 无法接收验证码？\nA: 请检查手机号是否正确，或联系客服\n\nQ: 账号被锁定？\nA: 请联系系统管理员解锁');
        }

        function showAgreement() {
            alert('用户协议\n\n1. 用户应当提供真实、准确的注册信息\n2. 用户不得利用本平台从事违法活动\n3. 用户应妥善保管账号和密码\n4. 平台有权对违规账号进行限制或封禁\n\n（完整协议请查看官网）');
        }

        function showPrivacy() {
            alert('隐私政策\n\n1. 我们重视用户隐私保护\n2. 收集信息仅用于提供服务\n3. 不会泄露用户个人信息\n4. 采取安全措施保护数据\n\n（完整政策请查看官网）');
        }
    </script>
</body>
</html>
