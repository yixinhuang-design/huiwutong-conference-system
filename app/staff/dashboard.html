<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作人员 · 数据看板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left"><span>9:41</span></div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>
            <div class="app-content">
                <!-- 头部信息卡片 -->
                <div class="card fade-in">
                    <div class="card-header">
                        <a href="meeting-detail.html" class="btn btn-secondary" style="padding:8px 12px;"><i class="fas fa-chevron-left"></i></a>
                        <div>
                            <div class="card-title">2025党务干部培训班</div>
                        </div>
                    </div>
                    <div style="padding:12px; background:#f8fafc; border-radius:8px; font-size:13px; color:#475569;">
                        <div><i class="fas fa-calendar-alt"></i> 2025年2月25日 (第1天/共3天)</div>
                        <div style="margin-top:6px;"><i class="fas fa-map-marker-alt"></i> 市委党校报告厅</div>
                        <div style="margin-top:6px;"><span class="status-chip status-positive"><i class="fas fa-play-circle"></i> 进行中</span></div>
                    </div>
                </div>

                <!-- 核心数据卡片 -->
                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-chart-bar" style="color:#2563eb;"></i>
                        <div class="card-title">核心数据</div>
                    </div>
                    <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:12px;">
                        <div style="background:linear-gradient(135deg,#e0f2fe,#bae6fd); padding:12px; border-radius:8px; text-align:center;">
                            <div style="font-size:20px; font-weight:700; color:#0369a1;">160</div>
                            <div style="font-size:12px; color:#0c4a6e; margin-top:4px;">总报名人数</div>
                        </div>
                        <div style="background:linear-gradient(135deg,#dcfce7,#bbf7d0); padding:12px; border-radius:8px; text-align:center;">
                            <div style="font-size:20px; font-weight:700; color:#166534;">142</div>
                            <div style="font-size:12px; color:#166534; margin-top:4px;">已审核通过</div>
                        </div>
                        <div style="background:linear-gradient(135deg,#fef3c7,#fde68a); padding:12px; border-radius:8px; text-align:center;">
                            <div style="font-size:20px; font-weight:700; color:#b45309;">12</div>
                            <div style="font-size:12px; color:#b45309; margin-top:4px;">待审核</div>
                        </div>
                        <div style="background:linear-gradient(135deg,#ddd6fe,#c4b5fd); padding:12px; border-radius:8px; text-align:center;">
                            <div style="font-size:20px; font-weight:700; color:#6d28d9;">138</div>
                            <div style="font-size:12px; color:#6d28d9; margin-top:4px;">已签到</div>
                        </div>
                    </div>
                </div>

                <!-- 快捷操作区 -->
                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-bolt" style="color:#f59e0b;"></i>
                        <div class="card-title">快捷操作</div>
                    </div>
                    <div class="assistant-list">
                        <a href="registration-manage.html" class="assistant-item-link">
                            <div class="assistant-item">
                                <div class="assistant-item-icon icon-gradient-blue"><i class="fas fa-file-contract"></i></div>
                                <div class="assistant-item-content">
                                    <div class="assistant-item-title">报名审核</div>
                                    <div class="assistant-item-desc">12人待审核，点击进行操作</div>
                                </div>
                                <i class="fas fa-chevron-right text-muted"></i>
                            </div>
                        </a>
                        <a href="seat-manage.html" class="assistant-item-link">
                            <div class="assistant-item">
                                <div class="assistant-item-icon icon-gradient-purple"><i class="fas fa-th-large"></i></div>
                                <div class="assistant-item-content">
                                    <div class="assistant-item-title">座位分配</div>
                                    <div class="assistant-item-desc">已分配138人，查看座位图</div>
                                </div>
                                <i class="fas fa-chevron-right text-muted"></i>
                            </div>
                        </a>
                        <a href="grouping-manage.html" class="assistant-item-link">
                            <div class="assistant-item">
                                <div class="assistant-item-icon icon-gradient-green"><i class="fas fa-sitemap"></i></div>
                                <div class="assistant-item-content">
                                    <div class="assistant-item-title">分组管理</div>
                                    <div class="assistant-item-desc">已分为2组，支持拖拽调整</div>
                                </div>
                                <i class="fas fa-chevron-right text-muted"></i>
                            </div>
                        </a>
                    </div>
                </div>
                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-exclamation-circle" style="color:#ef4444;"></i>
                        <div class="card-title">异常预警</div>
                    </div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon icon-gradient-orange"><i class="fas fa-user-clock"></i></div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">未签到学员 4 人</div>
                                <div class="assistant-item-desc">王梅、李强等已逾期，建议推送提醒</div>
                            </div>
                            <a class="cta-chip cta-chip--primary" href="#" style="margin-left:auto;"><i class="fas fa-paper-plane"></i> 推送</a>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon icon-gradient-red"><i class="fas fa-user-slash"></i></div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">未报名学员 2 人</div>
                                <div class="assistant-item-desc">请确认是否缺席或资格不符</div>
                            </div>
                            <a class="cta-chip cta-chip--danger" href="#" style="margin-left:auto;"><i class="fas fa-ban"></i> 标记</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-home"></i></div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-robot"></i></div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon"><i class="fas fa-comments"></i></div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-history"></i></div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-user"></i></div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
