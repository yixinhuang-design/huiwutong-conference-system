<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精彩花絮归档</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left"><span>9:41</span></div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content">
                <div class="card fade-in">
                    <div class="card-header">
                        <a href="past.html" class="btn btn-secondary" style="padding:8px 12px;"><i class="fas fa-chevron-left"></i></a>
                        <div>
                            <div class="card-title">2025党务干部培训班</div>
                        </div>
                    </div>
                </div>

                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-camera" style="color:#2563eb;"></i>
                        <div class="card-title">图片库</div>
                    </div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon"><i class="fas fa-image"></i></div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">开班仪式全景照</div>
                                <div class="assistant-item-desc">像素 6000x4000 · 可用于新闻报道</div>
                                <a class="link-inline" href="#"><i class="fas fa-arrow-right"></i> 下载图片</a>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#22c55e,#16a34a);">
                                <i class="fas fa-image"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">分组研讨精彩瞬间</div>
                                <div class="assistant-item-desc">已完成隐私排查 · 可公开发布</div>
                                <span class="status-chip status-positive"><i class="fas fa-check-double"></i> 已审核</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card fade-in" id="videos">
                    <div class="card-header">
                        <i class="fas fa-video" style="color:#f97316;"></i>
                        <div class="card-title">视频集锦</div>
                    </div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon"><i class="fas fa-play"></i></div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">培训回顾短片</div>
                                <div class="assistant-item-desc">时长 03:20 · 带字幕 · 可一键播放</div>
                                <a class="link-inline" href="#"><i class="fas fa-arrow-right"></i> 播放视频</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-home"></i></div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-robot"></i></div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-comments"></i></div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon"><i class="fas fa-history"></i></div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-user"></i></div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
