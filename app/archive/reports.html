<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>总结报告归档</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left"><span>9:41</span></div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content">
                <div class="card fade-in">
                    <div class="card-header">
                        <a href="past.html" class="btn btn-secondary" style="padding:8px 12px;"><i class="fas fa-chevron-left"></i></a>
                        <div>
                            <div class="card-title">2025党务干部培训班</div>
                        </div>
                        <button class="btn btn-outline" style="padding:8px 12px;"><i class="fas fa-share-square"></i> 分享</button>
                    </div>
                </div>

                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-file-alt" style="color:#2563eb;"></i>
                        <div class="card-title">培训总结</div>
                    </div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon"><i class="fas fa-file-word"></i></div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">2024年数智党建培训班总结.docx</div>
                                <div class="assistant-item-desc">更新：2024-11-10 · 字数 4500 · 主体结构完备</div>
                                <a class="link-inline" href="#"><i class="fas fa-arrow-right"></i> 下载报告</a>
                                <span class="status-chip status-secure"><i class="fas fa-shield-check"></i> 已上传</span>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#22c55e,#16a34a);">
                                <i class="fas fa-file-excel"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">培训成果指标汇总.xlsx</div>
                                <div class="assistant-item-desc">含参训人数、签到、问卷、测试成绩等统计指标</div>
                                <span class="status-chip status-secure"><i class="fas fa-shield-check"></i> 已上传</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-home"></i></div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-robot"></i></div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-comments"></i></div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon"><i class="fas fa-history"></i></div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-user"></i></div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
