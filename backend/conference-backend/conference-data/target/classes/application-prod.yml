# ===== 数据服务 - 生产环境配置 =====
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/conference_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:conference}
    password: ${MYSQL_PASSWORD:Conference@2026}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: WARN
    com.conference: INFO
