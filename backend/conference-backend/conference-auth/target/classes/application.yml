server:
  port: 8081
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024

spring:
  application:
    name: conference-auth
  
  config:
    import: 
      - optional:nacos:conference-auth.yml
  
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: CONFERENCE_GROUP
        enabled: ${NACOS_ENABLED:false}
        register-enabled: ${NACOS_REGISTER_ENABLED:${NACOS_ENABLED:false}}
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: CONFERENCE_GROUP
        file-extension: yml
        enabled: ${NACOS_CONFIG_ENABLED:${NACOS_ENABLED:false}}
        import-check:
          enabled: false
  
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3308}/conference_auth?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&serverCharacterEncoding=utf8mb4
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:Hnhx@123}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # 字符集配置 - 数组格式
      connection-init-sqls:
        - SET NAMES utf8mb4
  
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
  
  # Flyway 数据库迁移配置
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: false
    validate-on-migrate: true

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.conference.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    root: INFO
    com.conference: DEBUG

# JWT配置
jwt:
  secret: ConferenceSystemJwtSecretKey2026ForSmartMeetingSystem
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天
