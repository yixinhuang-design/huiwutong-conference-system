spring:
  application:
    name: conference-meeting

  config:
    import:
      - optional:nacos:conference-meeting.yml
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3308/conference_registration?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Hnhx@123

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        register-enabled: ${NACOS_REGISTER_ENABLED:${NACOS_ENABLED:false}}
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: CONFERENCE_GROUP
        service: conference-meeting
      config:
        enabled: ${NACOS_CONFIG_ENABLED:${NACOS_ENABLED:false}}
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: CONFERENCE_GROUP
        file-extension: yml

  web:
    resources:
      add-mappings: false

  flyway:
    enabled: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.conference.meeting.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
      table-prefix: conf_

server:
  port: 8084
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.conference: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
