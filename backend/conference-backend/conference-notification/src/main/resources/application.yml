server:
  port: 8083
  servlet:
    context-path: /

spring:
  application:
    name: conference-notification
  cloud:
    nacos:
      discovery:
        enabled: false
        register-enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
  config:
    import: "optional:nacos:"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3308/conference_notification?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    username: root
    password: Hnhx@123
    druid:
      initial-size: 5
      max-active: 20
      min-idle: 5
      test-while-idle: true
      test-on-borrow: true
      validation-query: select 1
  flyway:
    enabled: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.conference.notification.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: INFO
    com.conference: DEBUG
    com.baomidou: DEBUG

# ===== 阿里云短信配置 =====
aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:会通}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:SMS_000000}
    # 是否启用真实短信发送（false时仅打印日志不调用接口）
    enabled: ${ALIYUN_SMS_ENABLED:false}

# ===== UniPush 系统消息配置 =====
unipush:
  app-id: ${UNIPUSH_APP_ID:}
  app-key: ${UNIPUSH_APP_KEY:}
  master-secret: ${UNIPUSH_MASTER_SECRET:}

# ===== 报名服务地址（用于查询收件人信息）=====
service:
  registration:
    base-url: http://localhost:8082
