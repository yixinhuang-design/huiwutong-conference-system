server:
  port: 8086
  servlet:
    context-path: /

spring:
  application:
    name: conference-seating
  
  config:
    import:
      - optional:nacos:conference-seating.yml
  
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://localhost:3308/conference_seating?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: Hnhx@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: false
  
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        register-enabled: ${NACOS_REGISTER_ENABLED:${NACOS_ENABLED:false}}
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: CONFERENCE_GROUP
        service: conference-seating
      config:
        enabled: ${NACOS_CONFIG_ENABLED:${NACOS_ENABLED:false}}
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: CONFERENCE_GROUP
        file-extension: yml

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: ASSIGN_ID

logging:
  level:
    root: info
    com.conference: debug
