<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能会议系统</title>
    <link rel="stylesheet" href="../css/glassmorphism.css">
    <link rel="stylesheet" href="../css/conference-theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/vue/3.3.4/vue.global.prod.js"></script>
    <script src="../js/interaction-utils.js"></script>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-card glass-card">
                <div class="login-header">
                    <div class="logo">
                        <i class="fas fa-video"></i>
                    </div>
                    <h1>智能会议系统</h1>
                    <p>请选择登录方式</p>
                </div>

                <!-- 登录类型切换 -->
                <div class="login-type-tabs">
                    <button class="tab-btn" 
                            :class="{ active: loginType === 'system' }"
                            @click="loginType = 'system'">
                        <i class="fas fa-user-shield"></i>
                        系统管理员
                    </button>
                    <button class="tab-btn" 
                            :class="{ active: loginType === 'tenant' }"
                            @click="loginType = 'tenant'">
                        <i class="fas fa-building"></i>
                        租户管理员
                    </button>
                </div>

                <!-- 系统管理员登录 -->
                <div v-if="loginType === 'system'" class="login-form">
                    <div class="form-group">
                        <label>
                            <i class="fas fa-user"></i>
                            账号
                        </label>
                        <input type="text" 
                               v-model="systemLogin.username" 
                               placeholder="请输入系统管理员账号"
                               @keyup.enter="systemLoginSubmit">
                    </div>
                    <div class="form-group">
                        <label>
                            <i class="fas fa-lock"></i>
                            密码
                        </label>
                        <div class="input-with-icon">
                            <input :type="showPassword ? 'text' : 'password'" 
                                   v-model="systemLogin.password" 
                                   placeholder="请输入密码"
                                   @keyup.enter="systemLoginSubmit">
                            <button type="button" class="icon-btn" @click="showPassword = !showPassword">
                                <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" v-model="rememberMe">
                            <span>记住我</span>
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>
                    <button class="btn-primary btn-block" @click="systemLoginSubmit" :disabled="logging">
                        <i class="fas fa-sign-in-alt" v-if="!logging"></i>
                        <i class="fas fa-spinner fa-spin" v-if="logging"></i>
                        {{ logging ? '登录中...' : '登录' }}
                    </button>
                </div>

                <!-- 租户管理员登录 -->
                <div v-if="loginType === 'tenant'" class="login-form">
                    <div class="form-group">
                        <label>
                            <i class="fas fa-building"></i>
                            选择租户
                        </label>
                        <select v-model="tenantLogin.tenantId" @change="onTenantSelect">
                            <option value="">请选择租户</option>
                            <option v-for="tenant in availableTenants" :key="tenant.id" :value="tenant.id">
                                {{ tenant.name }} ({{ tenant.code }})
                            </option>
                        </select>
                        <div v-if="tenantLogin.tenantId && selectedTenantInfo" class="tenant-info">
                            <div class="info-item">
                                <span class="label">联系人:</span>
                                <span class="value">{{ selectedTenantInfo.contact }}</span>
                            </div>
                            <div class="info-item">
                                <span class="label">联系电话:</span>
                                <span class="value">{{ selectedTenantInfo.phone }}</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>
                            <i class="fas fa-user"></i>
                            账号
                        </label>
                        <input type="text" 
                               v-model="tenantLogin.username" 
                               placeholder="请输入租户管理员账号"
                               :disabled="!tenantLogin.tenantId"
                               @keyup.enter="tenantLoginSubmit">
                    </div>
                    <div class="form-group">
                        <label>
                            <i class="fas fa-lock"></i>
                            密码
                        </label>
                        <div class="input-with-icon">
                            <input :type="showPassword ? 'text' : 'password'" 
                                   v-model="tenantLogin.password" 
                                   placeholder="请输入密码"
                                   :disabled="!tenantLogin.tenantId"
                                   @keyup.enter="tenantLoginSubmit">
                            <button type="button" class="icon-btn" @click="showPassword = !showPassword">
                                <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" v-model="rememberTenant">
                            <span>记住租户选择</span>
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>
                    <button class="btn-primary btn-block" 
                            @click="tenantLoginSubmit" 
                            :disabled="!tenantLogin.tenantId || logging">
                        <i class="fas fa-sign-in-alt" v-if="!logging"></i>
                        <i class="fas fa-spinner fa-spin" v-if="logging"></i>
                        {{ logging ? '登录中...' : '登录' }}
                    </button>
                </div>

                <!-- 登录提示 -->
                <div class="login-tips">
                    <div class="tip-item">
                        <i class="fas fa-info-circle"></i>
                        <span>系统管理员可直接登录，无需选择租户</span>
                    </div>
                    <div class="tip-item">
                        <i class="fas fa-info-circle"></i>
                        <span>租户管理员需先选择租户，再输入账号密码</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    loginType: 'system', // 'system' 或 'tenant'
                    showPassword: false,
                    rememberMe: false,
                    rememberTenant: true,
                    logging: false,
                    systemLogin: {
                        username: '',
                        password: ''
                    },
                    tenantLogin: {
                        tenantId: '',
                        username: '',
                        password: ''
                    },
                    availableTenants: [],
                    selectedTenantInfo: null
                }
            },
            mounted() {
                this.loadAvailableTenants();
                this.loadRememberedData();
            },
            methods: {
                async loadAvailableTenants() {
                    // 模拟加载可用租户列表（仅显示启用状态的租户）
                    this.availableTenants = [
                        {
                            id: 'tenant_001',
                            name: '示例企业A',
                            code: 'TENANT_A',
                            contact: '张三',
                            phone: '13800138000',
                            status: 'active'
                        },
                        {
                            id: 'tenant_002',
                            name: '示例政府B',
                            code: 'TENANT_B',
                            contact: '李四',
                            phone: '13900139000',
                            status: 'active'
                        }
                    ];
                },
                
                loadRememberedData() {
                    // 加载记住的租户选择
                    const rememberedTenantId = localStorage.getItem('rememberedTenantId');
                    if (rememberedTenantId && this.rememberTenant) {
                        this.tenantLogin.tenantId = rememberedTenantId;
                        this.onTenantSelect();
                    }
                    
                    // 加载记住的用户名
                    const rememberedUsername = localStorage.getItem('rememberedUsername');
                    if (rememberedUsername && this.rememberMe) {
                        this.systemLogin.username = rememberedUsername;
                    }
                },
                
                onTenantSelect() {
                    if (this.tenantLogin.tenantId) {
                        this.selectedTenantInfo = this.availableTenants.find(
                            t => t.id === this.tenantLogin.tenantId
                        );
                        
                        // 保存租户选择
                        if (this.rememberTenant) {
                            localStorage.setItem('rememberedTenantId', this.tenantLogin.tenantId);
                        }
                    } else {
                        this.selectedTenantInfo = null;
                    }
                },
                
                async systemLoginSubmit() {
                    if (!this.systemLogin.username || !this.systemLogin.password) {
                        this.$showToast('请输入账号和密码', 'warning');
                        return;
                    }
                    
                    this.logging = true;
                    
                    try {
                        // 模拟API调用
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        
                        // 保存记住的用户名
                        if (this.rememberMe) {
                            localStorage.setItem('rememberedUsername', this.systemLogin.username);
                        }
                        
                        // 模拟获取JWT Token
                        const token = 'system_admin_token_' + Date.now();
                        localStorage.setItem('authToken', token);
                        localStorage.setItem('userType', 'system_admin');
                        localStorage.setItem('username', this.systemLogin.username);
                        
                        // 跳转到首页
                        window.location.href = '../index.html';
                        
                    } catch (error) {
                        console.error('登录失败:', error);
                        this.$showToast('登录失败，请检查账号密码', 'error');
                    } finally {
                        this.logging = false;
                    }
                },
                
                async tenantLoginSubmit() {
                    if (!this.tenantLogin.tenantId) {
                        this.$showToast('请先选择租户', 'warning');
                        return;
                    }
                    
                    if (!this.tenantLogin.username || !this.tenantLogin.password) {
                        this.$showToast('请输入账号和密码', 'warning');
                        return;
                    }
                    
                    this.logging = true;
                    
                    try {
                        // 模拟API调用
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        
                        // 保存租户选择
                        if (this.rememberTenant) {
                            localStorage.setItem('rememberedTenantId', this.tenantLogin.tenantId);
                        }
                        
                        // 模拟获取JWT Token
                        const token = 'tenant_admin_token_' + Date.now();
                        localStorage.setItem('authToken', token);
                        localStorage.setItem('userType', 'tenant_admin');
                        localStorage.setItem('tenantId', this.tenantLogin.tenantId);
                        localStorage.setItem('username', this.tenantLogin.username);
                        
                        // 跳转到首页
                        window.location.href = '../index.html';
                        
                    } catch (error) {
                        console.error('登录失败:', error);
                        this.$showToast('登录失败，请检查账号密码', 'error');
                    } finally {
                        this.logging = false;
                    }
                }
            },
            mixins: [window.InteractionMixin]
        }).mount('#app');
    </script>

    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
        }
        
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 1rem;
        }
        
        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .login-header p {
            color: #666;
            font-size: 0.95rem;
        }
        
        .login-type-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .tab-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn:hover {
            color: #667eea;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-btn i {
            font-size: 1.5rem;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-group label {
            font-weight: 500;
            color: #333;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-group label i {
            color: #667eea;
        }
        
        .form-group input,
        .form-group select {
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group input:disabled,
        .form-group select:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }
        
        .input-with-icon {
            position: relative;
        }
        
        .input-with-icon input {
            width: 100%;
            padding-right: 3rem;
        }
        
        .icon-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            padding: 0.25rem;
        }
        
        .icon-btn:hover {
            color: #667eea;
        }
        
        .tenant-info {
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 6px;
            font-size: 0.9rem;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }
        
        .info-item:last-child {
            margin-bottom: 0;
        }
        
        .info-item .label {
            color: #666;
        }
        
        .info-item .value {
            color: #333;
            font-weight: 500;
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        
        .checkbox-label input[type="checkbox"] {
            margin: 0;
        }
        
        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .btn-block {
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .login-tips {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .tip-item {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
            color: #666;
        }
        
        .tip-item:last-child {
            margin-bottom: 0;
        }
        
        .tip-item i {
            color: #667eea;
            margin-top: 0.2rem;
        }
        
        @media (max-width: 768px) {
            .login-card {
                padding: 2rem 1.5rem;
            }
            
            .login-header h1 {
                font-size: 1.5rem;
            }
            
            .logo {
                font-size: 3rem;
            }
        }
    </style>
</body>
</html>
