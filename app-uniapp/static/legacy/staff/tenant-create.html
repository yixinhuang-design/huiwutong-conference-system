<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建新租户 - 系统管理员</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <!-- iOS 状态栏 -->
            <div class="status-bar">
                <div class="status-left">
                    <span>9:41</span>
                </div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <!-- 应用内容 -->
            <div class="app-content">
                <!-- 页面标题 -->
                <div class="card card--no-margin fade-in">
                    <div class="card-header">
                        <a href="tenant-manage.html" class="btn btn-secondary">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                        <div>
                            <div class="card-title">2025党务干部培训班</div>
                        </div>
                    </div>
                </div>

                <!-- 步骤指示器 -->
                <div class="card fade-in">
                    <div class="progress-bar">
                        <div class="progress-step active">
                            <div class="step-number">1</div>
                            <div class="step-label">基本信息</div>
                        </div>
                        <div class="progress-line"></div>
                        <div class="progress-step">
                            <div class="step-number">2</div>
                            <div class="step-label">参数配置</div>
                        </div>
                        <div class="progress-line"></div>
                        <div class="progress-step">
                            <div class="step-number">3</div>
                            <div class="step-label">管理员设置</div>
                        </div>
                    </div>
                </div>

                <!-- 租户基本信息 -->
                <div class="section-title">租户基本信息</div>
                <div class="card fade-in">
                    <div class="card-header">
                        <div class="icon-container icon-gradient-blue">
                            <i class="fas fa-building"></i>
                        </div>
                        <div class="card-title">基本信息</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">租户名称 <span class="required">*</span></label>
                        <input type="text" class="input-field" placeholder="请输入租户名称">
                    </div>

                    <div class="form-group">
                        <label class="form-label">租户编码 <span class="required">*</span></label>
                        <input type="text" class="input-field" placeholder="如：T004">
                        <div class="form-hint">系统唯一标识，创建后不可修改</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">租户类型 <span class="required">*</span></label>
                        <select class="input-field">
                            <option>请选择租户类型</option>
                            <option>政府机关</option>
                            <option>事业单位</option>
                            <option>企业</option>
                            <option>社会组织</option>
                            <option>其他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">联系人</label>
                        <input type="text" class="input-field" placeholder="请输入联系人姓名">
                    </div>

                    <div class="form-group">
                        <label class="form-label">联系电话 <span class="required">*</span></label>
                        <input type="tel" class="input-field" placeholder="请输入联系电话">
                    </div>

                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="input-field" placeholder="请输入联系邮箱">
                    </div>
                </div>

                <!-- 租户参数配置 -->
                <div class="section-title">租户参数配置</div>
                <div class="card fade-in">
                    <div class="card-header">
                        <div class="icon-container icon-gradient-orange">
                            <i class="fas fa-cog"></i>
                        </div>
                        <div class="card-title">参数配置</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">权限范围</label>
                        <select class="input-field">
                            <option>全部功能</option>
                            <option>基础功能</option>
                            <option>自定义</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">使用期限</label>
                        <div class="date-range-group">
                            <input type="date" class="input-field" value="2025-02-06">
                            <span>至</span>
                            <input type="date" class="input-field" value="2026-02-06">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">最大用户数</label>
                        <input type="number" class="input-field" placeholder="请输入最大用户数" value="100">
                        <div class="form-hint">0表示不限制</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">最大会议数</label>
                        <input type="number" class="input-field" placeholder="请输入最大会议数" value="50">
                        <div class="form-hint">0表示不限制</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">存储配额 (GB)</label>
                        <input type="number" class="input-field" placeholder="请输入存储配额" value="50">
                        <div class="form-hint">0表示不限制</div>
                    </div>
                </div>

                <!-- 租户管理员设置 -->
                <div class="section-title">租户管理员设置</div>
                <div class="card fade-in">
                    <div class="card-header">
                        <div class="icon-container icon-gradient-green">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <div class="card-title">管理员设置</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">管理员账号 <span class="required">*</span></label>
                        <input type="text" class="input-field" placeholder="请输入管理员账号">
                        <div class="form-hint">用于登录系统的账号</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">初始密码 <span class="required">*</span></label>
                        <div class="input-group">
                            <input type="password" class="input-field" placeholder="请输入初始密码" value="123456">
                            <button class="btn btn-secondary">
                                <i class="fas fa-sync"></i>
                            </button>
                        </div>
                        <div class="form-hint">系统默认密码，首次登录后可修改</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">管理员姓名 <span class="required">*</span></label>
                        <input type="text" class="input-field" placeholder="请输入管理员姓名">
                    </div>

                    <div class="form-group">
                        <label class="form-label">管理员手机 <span class="required">*</span></label>
                        <input type="tel" class="input-field" placeholder="请输入管理员手机号">
                    </div>
                </div>

                <!-- 创建按钮 -->
                <div class="card fade-in">
                    <div class="cta-bar">
                        <button class="btn btn-secondary btn--flex">
                            <i class="fas fa-save"></i> 保存草稿
                        </button>
                        <button class="btn btn-primary btn--flex" onclick="location.href='tenant-manage.html'">
                            <i class="fas fa-check"></i> 创建租户
                        </button>
                    </div>
                </div>

                <!-- 温馨提示 -->
                <div class="info-banner fade-in">
                    <strong>提示</strong>
                    租户创建成功后，系统将自动生成租户ID，并发送账号信息到管理员手机。管理员可使用该账号登录租户管理后台。
                </div>

            </div>

            <!-- 底部导航栏 -->
            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
