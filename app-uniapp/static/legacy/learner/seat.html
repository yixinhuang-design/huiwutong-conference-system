<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座位图 - 学员视角</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left">
                    <span>9:41</span>
                </div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content">
                <div class="card fade-in">
                    <div class="card-header">
                        <a href="meeting-detail.html" class="btn btn-secondary">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                        <div class="card-title">座位信息</div>
                    </div>
                </div>

                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-chair" style="color:#2563eb;"></i>
                        <div class="card-title">我的座位</div>
                    </div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-chair"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">前区 · 第 3 排 · 12 座</div>
                                <span class="status-chip status-secure"><i class="fas fa-check-circle"></i> 已签到</span>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#22c55e,#16a34a);">
                                <i class="fas fa-users"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">同组成员</div>
                                <a class="cta-chip cta-chip--primary" href="groups.html">查看分组</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-map" style="color:#f97316;"></i>
                        <div class="card-title">会场导航</div>
                    </div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-route"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">报告厅路线</div>
                                <div class="assistant-item-desc">步行约 5 分钟，沿教学楼东侧主路进入</div>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#a855f7,#7c3aed);">
                                <i class="fas fa-door-open"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">分组讨论室</div>
                                <div class="assistant-item-desc">A 栋三层 302 室</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
