<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私聊 · 学员与工作人员</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left"><span>9:41</span></div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content" style="padding-top: 100px;">
                <div class="card fade-in" style="position: fixed; top: 40px; left: 0; right: 0; z-index: 100; margin: 0 auto; width: 95%; border-radius: 12px;">
                    <div class="card-header">
                        <a href="../common/communication.html" class="btn btn-secondary">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                        <div>
                            <div class="card-title">私聊 · 李华 & 张主任</div>
                        </div>

                    </div>
                    <div class="pill-group">
                        <div class="pill-active">身份：学员</div>
                        <div class="pill">管理员在线</div>
                    </div>
                </div>

                <div class="info-banner fade-in">
                    <strong>提示</strong>
                    私聊消息仅双方可见，若涉及重要信息（如紧急请假），系统将自动生成提醒并通知班主任。
                </div>

                <div class="chat-wrapper fade-in">
                    <div class="chat-divider">今日 08:35</div>

                    <div class="chat-message user">
                        <div class="chat-avatar" style="background:linear-gradient(135deg,#38bdf8,#0ea5e9);">
                            <i class="fas fa-user"></i>
                        </div>
                        <div>
                            <div class="chat-bubble">
                                张主任早上好，我因为临时高铁延误，预计 09:30 到达签到点，可以补签吗？
                            </div>
                            <div class="chat-meta">李华 · 08:35</div>
                        </div>
                    </div>

                    <div class="chat-message">
                        <div class="chat-avatar" style="background:linear-gradient(135deg,#2563eb,#1d4ed8);">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <div>
                            <div class="chat-bubble">
                                可以的，抵达后在签到处向工作人员说明情况，并在“补签申请”里上传乘车凭证即可。
                            </div>
                            <div class="chat-meta">张主任 · 08:37</div>
                        </div>
                    </div>

                    <a href="checkin.html" style="text-decoration:none;color:inherit;display:block;">
                        <div class="assistant-item card-item">
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">快捷操作：补签申请</div>
                                <div class="assistant-item-desc">填写迟到原因并上传凭证，班主任审核后即完成补签。</div>
                            </div>
                        </div>
                    </a>

                    <div class="chat-message">
                        <div class="chat-avatar" style="background:linear-gradient(135deg,#22c55e,#16a34a);">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <div>
                            <div class="chat-bubble">
                                另外，晚间查寝的提醒我已经帮你延后至 22:30，方便你安排入住。
                            </div>
                            <div class="chat-meta">张主任 · 08:38</div>
                        </div>
                    </div>

                    <div class="chat-message user">
                        <div class="chat-avatar" style="background:linear-gradient(135deg,#38bdf8,#0ea5e9);">
                            <i class="fas fa-user"></i>
                        </div>
                        <div>
                            <div class="chat-bubble">
                                太感谢了，我到了之后再跟您确认。
                            </div>
                            <div class="chat-meta">李华 · 08:39</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="chat-input-bar" style="position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;">
                <button class="btn btn-secondary" style="padding:10px 12px;">
                    <i class="fas fa-paperclip"></i>
                </button>
                <input type="text" class="chat-input" placeholder="输入消息，可发送图片或语音">
                <button class="btn btn-primary" style="padding:10px 16px;">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
