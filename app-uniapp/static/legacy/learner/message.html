<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言赠语 - 学员视角</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left">
                    <span>9:41</span>
                </div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>
            <div class="app-content">
                <div class="card card--no-margin fade-in">
                    <div class="card-header">
                        <a href="meeting-detail.html" class="btn btn-secondary">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                        <div class="card-title">2025党务干部培训班</div>
                        <button class="btn btn-primary"><i class="fas fa-pen"></i> 写留言</button>
                    </div>
                </div>
                <div style="height:8px;"></div>
                <!-- 精选留言列表，仅保留核心信息 -->
                <div class="card fade-in">
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">张伟 · 市委组织部</div>
                                <div class="assistant-item-desc">“本次培训让我深刻理解党建数字化的重要意义，感谢老师们的悉心指导。”</div>
                                <span class="status-chip status-positive"><i class="fas fa-thumbs-up"></i> 获赞 23</span>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#22c55e,#16a34a);">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">刘婷 · 市直机关</div>
                                <div class="assistant-item-desc">“期待与大家保持联系，共同推进基层党建工作。”</div>
                                <span class="status-chip status-light"><i class="fas fa-thumbs-up"></i> 获赞 15</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
