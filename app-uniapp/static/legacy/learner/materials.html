<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资料下载 - 学员视角</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left">
                    <span>9:41</span>
                </div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content">
                <div class="card fade-in">
                    <div class="card-header">
                        <a href="meeting-detail.html" class="btn btn-secondary">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                        <div>
                            <div class="card-title">2025党务干部培训班</div>
                        </div>
                        <button class="btn btn-outline">
                            <i class="fas fa-download"></i> 一键打包
                        </button>
                    </div>
                </div>
                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-chalkboard-teacher" style="color:#2563eb;"></i>
                        <div class="card-title">课程资料</div>
                    </div>
                    <div id="material-list" class="assistant-list">
                        <!-- 资料内容由后端渲染，支持多格式下载与收藏 -->
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-file-pdf" style="color:#e53e3e;"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">《党务干部培训手册》</div>
                                <div class="assistant-item-desc">PDF · 2026-02-20 上传</div>
                            </div>
                            <div class="assistant-item-actions">
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-download"></i> 下载</a>
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-star"></i> 收藏</a>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-file-powerpoint" style="color:#f59e42;"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">培训开班仪式PPT</div>
                                <div class="assistant-item-desc">PPT · 2026-02-18 上传</div>
                            </div>
                            <div class="assistant-item-actions">
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-download"></i> 下载</a>
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-star"></i> 收藏</a>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-file-word" style="color:#2563eb;"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">心得体会范文.docx</div>
                                <div class="assistant-item-desc">Word · 2026-02-17 上传</div>
                            </div>
                            <div class="assistant-item-actions">
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-download"></i> 下载</a>
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-star"></i> 收藏</a>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-video" style="color:#22c55e;"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">培训课程回放</div>
                                <div class="assistant-item-desc">视频 · 2026-02-16 上传</div>
                            </div>
                            <div class="assistant-item-actions">
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-download"></i> 下载</a>
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-star"></i> 收藏</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
