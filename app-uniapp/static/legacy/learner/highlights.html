<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精彩花絮 - 学员视角</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left">
                    <span>9:41</span>
                </div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content">
                <div class="card fade-in">
                    <div class="card-header">
                        <a href="meeting-detail.html" class="btn btn-secondary">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                        <div>
                            <div class="card-title">2025党务干部培训班</div>
                        </div>
                    </div>
                </div>
                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-camera" style="color:#2563eb;"></i>
                        <div class="card-title">图文精选</div>
                    </div>
                    <div id="highlight-list" class="assistant-list">
                        <!-- 精彩花絮内容由后端渲染，支持图片/视频下载与分享 -->
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <img src="../images/highlight1.jpg" alt="合影" style="width:48px;height:48px;border-radius:8px;object-fit:cover;">
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">开班仪式合影</div>
                                <div class="assistant-item-desc">2026-02-20 · 培训开班仪式现场</div>
                            </div>
                            <div class="assistant-item-actions">
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-download"></i> 下载</a>
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-share-alt"></i> 分享</a>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <img src="../images/highlight2.jpg" alt="小组讨论" style="width:48px;height:48px;border-radius:8px;object-fit:cover;">
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">小组讨论精彩瞬间</div>
                                <div class="assistant-item-desc">2026-02-19 · 分组头脑风暴</div>
                            </div>
                            <div class="assistant-item-actions">
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-download"></i> 下载</a>
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-share-alt"></i> 分享</a>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <img src="../images/highlight3.jpg" alt="讲师授课" style="width:48px;height:48px;border-radius:8px;object-fit:cover;">
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">讲师授课风采</div>
                                <div class="assistant-item-desc">2026-02-18 · 现场互动提问</div>
                            </div>
                            <div class="assistant-item-actions">
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-download"></i> 下载</a>
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-share-alt"></i> 分享</a>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <img src="../images/highlight4.jpg" alt="才艺展示" style="width:48px;height:48px;border-radius:8px;object-fit:cover;">
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">学员才艺展示</div>
                                <div class="assistant-item-desc">2026-02-17 · 晚会节目花絮</div>
                            </div>
                            <div class="assistant-item-actions">
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-download"></i> 下载</a>
                                <a href="#" class="btn btn-outline btn-xs"><i class="fas fa-share-alt"></i> 分享</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
