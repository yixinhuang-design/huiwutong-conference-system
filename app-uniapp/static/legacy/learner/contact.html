<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通讯录 - 学员视角</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left">
                    <span>9:41</span>
                </div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content">
                <div class="card fade-in">
                    <div class="card-header">
                        <a href="meeting-detail.html" class="btn btn-secondary">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                        <div>
                            <div class="card-title">2025党务干部培训班</div>
                        </div>
                    </div>
                    <div class="contact-search">
                        <i class="fas fa-search"></i>
                        <input class="contact-search-input" type="text" placeholder="搜索联系人（姓名/单位/职务）" />
                    </div>
                </div>

                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-user-tie" style="color:#2563eb;"></i>
                        <div class="card-title">班主任 / 工作人员</div>
                    </div>
                    <div class="contact-group-title">班主任</div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#2563eb,#1d4ed8);">
                                <i class="fas fa-user-tie"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">李敏 · 班主任</div>
                                <div class="contact-duty">负责事项：学员管理与答疑</div>
                                <div class="contact-phone">138****6250</div>
                            </div>
                            <a class="btn btn-outline" href="chat-private.html" style="padding:6px 10px;text-decoration:none;">
                                <i class="fas fa-comment-dots"></i> 发消息
                            </a>
                        </div>
                    </div>

                    <div class="contact-group-title">会务工作人员</div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#22c55e,#16a34a);">
                                <i class="fas fa-user-cog"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">王磊 · 会务协调</div>
                                <div class="contact-duty">负责事项：签到/座位</div>
                                <div class="contact-phone">139****0825</div>
                            </div>
                            <a class="btn btn-outline" href="chat-private.html" style="padding:6px 10px;text-decoration:none;">
                                <i class="fas fa-comment-dots"></i> 发消息
                            </a>
                        </div>
                    </div>
                </div>

                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-users" style="color:#f97316;"></i>
                        <div class="card-title">同学通讯录</div>
                    </div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">张伟 · 市委组织部科员</div>
                                <div class="contact-phone">137****9080</div>
                            </div>
                            <a class="btn btn-outline" href="chat-private.html" style="padding:6px 10px;text-decoration:none;">
                                <i class="fas fa-comment-dots"></i> 发消息
                            </a>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#7c3aed,#6d28d9);">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">刘婷 · 市直机关党务干事</div>
                                <div class="contact-phone">暂无手机号</div>
                            </div>
                            <a class="btn btn-outline" href="chat-private.html" style="padding:6px 10px;text-decoration:none;">
                                <i class="fas fa-comment-dots"></i> 发消息
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
