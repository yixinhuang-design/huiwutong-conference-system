<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言赠语归档</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left"><span>9:41</span></div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content">
                <div class="card fade-in">
                    <div class="card-header">
                        <a href="past.html" class="btn btn-secondary" style="padding:8px 12px;"><i class="fas fa-chevron-left"></i></a>
                        <div>
                            <div class="card-title">2025党务干部培训班</div>
                        </div>
                        <button class="btn btn-primary" style="padding:8px 12px;"><i class="fas fa-print"></i> 生成留声墙</button>
                    </div>
                </div>

                <div class="card fade-in">
                    <div class="card-header">
                        <i class="fas fa-heart" style="color:#f43f5e;"></i>
                        <div class="card-title">精选留言</div>
                    </div>
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon"><i class="fas fa-user"></i></div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">张伟 · 市委组织部</div>
                                <div class="assistant-item-desc">“感谢老师们的精彩授课，这段学习经历受益匪浅。”</div>
                                <span class="status-chip status-positive"><i class="fas fa-thumbs-up"></i> 获赞 32</span>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#22c55e,#16a34a);">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">刘婷 · 市直机关</div>
                                <div class="assistant-item-desc">“期望继续和大家保持交流，共同推进党建创新。”</div>
                                <span class="status-chip status-light"><i class="fas fa-thumbs-up"></i> 获赞 18</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-home"></i></div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-robot"></i></div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-comments"></i></div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon"><i class="fas fa-history"></i></div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon"><i class="fas fa-user"></i></div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
