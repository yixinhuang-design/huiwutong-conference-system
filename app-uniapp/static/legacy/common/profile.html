<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能会议助手 - 我的</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left">
                    <span>9:41</span>
                </div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content">
                <div class="card fade-in" style="text-align: center;">
                    <div class="card-header" style="flex-direction: column; align-items: center; text-align: center;">
                        <div style="width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#38bdf8,#0ea5e9);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;">
                            <i class="fas fa-user"></i>
                        </div>
                        <div style="margin-top: 12px;">
                            <div class="card-title">李华（学员）</div>
                            <div class="card-subtitle-inline" style="justify-content: center; gap: 8px;">
                                <span>市委组织部</span>
                                <span class="sep">｜</span>
                                <span>副处长</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card fade-in">
                    <a href="../learner/schedule.html" style="text-decoration:none;color:inherit;display:block;">
                        <div class="assistant-item assistant-clickable">
                            <div class="assistant-item-icon">
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">我的日程</div>
                                <div class="assistant-item-desc">查看课程时间、地点、讲师信息</div>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="card fade-in">
                    <a href="../staff/task-list.html" style="text-decoration:none;color:inherit;display:block;">
                        <div class="assistant-item assistant-clickable">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#f97316,#ea580c);">
                                <i class="fas fa-tasks"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">我的任务</div>
                                <div class="assistant-item-desc">查看待办任务、进行中任务和已完成任务</div>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="card fade-in">
                    <a href="../nav-all.html" style="text-decoration:none;color:inherit;display:block;">
                        <div class="assistant-item assistant-clickable">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#667eea,#764ba2);">
                                <i class="fas fa-th-large"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">全部功能</div>
                                <div class="assistant-item-desc">查看所有37个页面 · 学员端/协管员端/归档</div>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="card fade-in">
                    <a href="#" style="text-decoration:none;color:inherit;display:block;">
                        <div class="assistant-item assistant-clickable">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#16a34a,#15803d);">
                                <i class="fas fa-bell"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">我的提醒</div>
                                <div class="assistant-item-desc">查看签到提醒、任务提醒、系统通知</div>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="section-title">我的设置</div>
                <div class="card fade-in">
                    <div class="assistant-list">
                        <a href="#" style="text-decoration:none;color:inherit;display:block;">
                            <div class="assistant-item">
                                <div class="assistant-item-icon">
                                    <i class="fas fa-id-badge"></i>
                                </div>
                                <div class="assistant-item-content">
                                    <div class="assistant-item-title">账号与身份</div>
                                    <div class="assistant-item-desc">普通学员 · 可查看课程、签到、群聊与资料</div>
                                </div>
                            </div>
                        </a>
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#f97316,#ea580c);">
                                <i class="fas fa-lock"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">密码与安全</div>
                                <div class="assistant-item-desc">支持修改登录密码，开启手机验证码登录。</div>
                                <a class="cta-chip cta-chip--danger" href="#">安全设置</a>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#0ea5e9,#0284c7);">
                                <i class="fas fa-cog"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">通知权限</div>
                                <div class="assistant-item-desc">管理签到提醒、课程提醒、群消息推送。</div>
                                <a class="cta-chip cta-chip--primary" href="#">通知设置</a>
                            </div>
                        </div>
                    </div>
                    <div class="cta-bar" style="margin:12px 16px 4px;">
                        <button class="btn btn-primary" style="width:100%;background:#e11d48;border:none;">
                            <i class="fas fa-sign-out-alt"></i> 退出当前账号
                        </button>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
