<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能会议助手 - 往期</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
    <style>
        .past-header {
            text-align: center;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <div class="status-left">
                    <span>9:41</span>
                </div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="app-content">
                <div class="card fade-in">
                    <div class="card-header">
                        <div>
                            <div class="card-title">往期会议 / 培训</div>
                            <div class="card-subtitle">沉淀互动内容、资料归档与数据复盘，支持一键导出。</div>
                        </div>
                        <button class="btn btn-primary" style="padding:10px 16px;">
                            <i class="fas fa-download"></i>
                            导出全部资料
                        </button>
                    </div>
                    <div class="pill-group">
                        <div class="pill-active">全部</div>
                        <div class="pill">2025年</div>
                        <div class="pill">党建专题</div>
                        <div class="pill">干部提升</div>
                        <div class="pill">3个月内</div>
                    </div>
                </div>

                <div class="meeting-card fade-in">
                    <div class="meeting-header">
                        <div>
                            <div class="meeting-title">2024数智党建专题班</div>
                            <div class="meeting-meta">
                                <span><i class="fas fa-calendar-alt"></i> 2024-11-01 至 2024-11-05</span>
                                <span><i class="fas fa-map-marker-alt"></i> 杭州 · 党校综合楼</span>
                            </div>
                        </div>
                        <span class="status-chip status-neutral"><i class="fas fa-archive"></i> 已归档</span>
                    </div>
                    <div class="metric-grid">
                        <div class="metric-card">
                            <strong>98%</strong>
                            <span>签到率</span>
                        </div>
                        <div class="metric-card">
                            <strong>96%</strong>
                            <span>就寝率</span>
                        </div>
                        <div class="metric-card">
                            <strong>4.8</strong>
                            <span>课程评价</span>
                        </div>
                    </div>
                    <div class="meeting-actions">
                        <a href="../archive/materials.html" class="btn btn-primary">
                            <i class="fas fa-folder-open"></i>
                            资料目录
                        </a>
                        <a href="../archive/feedback.html" class="btn btn-outline">
                            <i class="fas fa-chart-line"></i>
                            数据与反馈
                        </a>
                    </div>
                </div>

                <div class="meeting-card fade-in">
                    <div class="meeting-header">
                        <div>
                            <div class="meeting-title">2024中青年干部能力提升班</div>
                            <div class="meeting-meta">
                                <span><i class="fas fa-calendar-alt"></i> 2024-08-18 至 2024-08-23</span>
                                <span><i class="fas fa-map-marker-alt"></i> 宁波 · 行政学院</span>
                            </div>
                        </div>
                        <span class="status-chip status-neutral"><i class="fas fa-archive"></i> 已归档</span>
                    </div>
                    <div class="metric-grid">
                        <div class="metric-card">
                            <strong>92%</strong>
                            <span>签到率</span>
                        </div>
                        <div class="metric-card">
                            <strong>87%</strong>
                            <span>问卷完成率</span>
                        </div>
                        <div class="metric-card">
                            <strong>4.6</strong>
                            <span>课程评价</span>
                        </div>
                    </div>
                    <div class="meeting-actions">
                        <a href="../archive/highlights.html" class="btn btn-primary">
                            <i class="fas fa-images"></i>
                            精彩花絮
                        </a>
                        <a href="../archive/reports.html" class="btn btn-outline">
                            <i class="fas fa-file-alt"></i>
                            总结报告
                        </a>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item active">
                    <div class="nav-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
