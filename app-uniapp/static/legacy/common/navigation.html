<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位置导航 - 智能会议助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/mobile.css">
    <style>
        .map-container {
            width: 100%;
            height: 400px;
            background: #e2e8f0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .map-placeholder {
            text-align: center;
            color: #64748b;
        }

        .map-placeholder i {
            font-size: 64px;
            margin-bottom: 16px;
            color: #94a3b8;
        }

        .navigation-route {
            background: #3b82f6;
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 8px 0;
        }

        .navigation-route-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .navigation-route-desc {
            font-size: 14px;
            opacity: 0.9;
        }

        .location-info {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 16px;
            margin: 8px 0;
        }

        .location-info-title {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .location-info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #64748b;
            margin: 4px 0;
        }

        .location-info-item i {
            width: 20px;
            color: #3b82f6;
        }

        .nav-actions {
            position: fixed;
            bottom: 80px;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: linear-gradient(to top, rgba(255,255,255,1) 0%, rgba(255,255,255,0.9) 100%);
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <!-- iOS 状态栏 -->
            <div class="status-bar">
                <div class="status-left">
                    <span>9:41</span>
                </div>
                <div class="status-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <!-- 应用内容 -->
            <div class="app-content">
                <!-- 页面标题 -->
                <div class="card fade-in" style="margin-bottom:12px;">
                    <div class="card-header">
                        <a href="home.html" class="btn btn-secondary" style="padding:8px 12px;">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                        <div>
                            <div class="card-title">位置导航</div>
                            <div class="card-subtitle">快速找到会场位置</div>
                        </div>
                    </div>
                </div>

                <!-- 目标位置信息 -->
                <div class="card fade-in">
                    <div class="card-header">
                        <div class="icon-container icon-gradient-orange">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div class="card-title">目标位置</div>
                    </div>
                    <div class="location-info">
                        <div class="location-info-title">市委党校报告厅</div>
                        <div class="location-info-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>详细地址：XX市XX区XX路XX号</span>
                        </div>
                        <div class="location-info-item">
                            <i class="fas fa-building"></i>
                            <span>所在楼层：1层东侧</span>
                        </div>
                        <div class="location-info-item">
                            <i class="fas fa-door-open"></i>
                            <span>入口位置：正门大厅</span>
                        </div>
                    </div>
                </div>

                <!-- 地图展示 -->
                <div class="card fade-in">
                    <div class="card-header">
                        <div class="icon-container icon-gradient-blue">
                            <i class="fas fa-map"></i>
                        </div>
                        <div class="card-title">地图导航</div>
                    </div>
                    <div class="map-container">
                        <div class="map-placeholder">
                            <i class="fas fa-map-marked-alt"></i>
                            <div>地图加载中...</div>
                            <div style="font-size:12px;margin-top:8px;">集成高德/百度地图API</div>
                        </div>
                    </div>
                </div>

                <!-- 导航路线 -->
                <div class="section-title">推荐路线</div>
                <div class="navigation-route">
                    <div class="navigation-route-title">
                        <i class="fas fa-walking"></i> 步行路线（推荐）
                    </div>
                    <div class="navigation-route-desc">约500米 · 预计7分钟到达</div>
                </div>

                <div class="navigation-route" style="background:#64748b;">
                    <div class="navigation-route-title">
                        <i class="fas fa-car"></i> 自驾路线
                    </div>
                    <div class="navigation-route-desc">约2.5公里 · 预计10分钟到达</div>
                </div>

                <div class="navigation-route" style="background:#059669;">
                    <div class="navigation-route-title">
                        <i class="fas fa-bus"></i> 公交路线
                    </div>
                    <div class="navigation-route-desc">3站 · 预计15分钟到达</div>
                </div>

                <!-- 周边设施 -->
                <div class="section-title">周边设施</div>
                <div class="card fade-in">
                    <div class="assistant-list">
                        <div class="assistant-item">
                            <div class="assistant-item-icon">
                                <i class="fas fa-parking"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">停车场</div>
                                <div class="assistant-item-desc">距离200米 · 共120个车位</div>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#f97316,#ea580c);">
                                <i class="fas fa-utensils"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">餐厅</div>
                                <div class="assistant-item-desc">党校食堂 · 1层西侧</div>
                            </div>
                        </div>
                        <div class="assistant-item">
                            <div class="assistant-item-icon" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);">
                                <i class="fas fa-coffee"></i>
                            </div>
                            <div class="assistant-item-content">
                                <div class="assistant-item-title">休息区</div>
                                <div class="assistant-item-desc">2层大厅 · 提供茶水</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 温馨提示 -->
                <div class="info-banner fade-in">
                    <strong>温馨提示</strong>
                    建议提前15分钟出发，预留充足时间。如遇交通拥堵，可选择公共交通出行。
                </div>

            </div>

            <!-- 导航操作按钮 -->
            <div class="nav-actions">
                <button class="btn btn-primary" style="width:100%;padding:14px;font-size:16px;">
                    <i class="fas fa-location-arrow"></i> 开始导航
                </button>
            </div>

            <!-- 底部导航栏 -->
            <div class="bottom-nav">
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <div class="nav-text">首页</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="nav-text">AI助理</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="nav-text">沟通</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="nav-text">往期</div>
                    <div class="nav-indicator"></div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="nav-text">我的</div>
                    <div class="nav-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
